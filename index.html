<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>付錢小遊戲</title>
<style>
@font-face{
  font-family:"BpmfZihiKaiStd-Regular";
  src: local("BpmfZihiKaiStd-Regular");
}
body{
  margin:0;
  font-family:"BpmfZihiKaiStd-Regular", sans-serif;
  background:#f2f2f2;
  overflow-x:hidden;
  overflow-y:auto;
}
/* ===== 提示頁 ===== */
#intro{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:50000;
}
.slide{
  position:relative;
  width: 80%;
  max-width: 1000px;
  height:95%;
  background:#97CBFF;
  border-radius:20px;
  padding:20px 40px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
}

.slideContentLeft{
  text-align:left;
  font-size:20px;
  line-height:1.2;
  margin-top: 0;

  /* 計算最大高度 = 視窗高度 x 0.95(藍框) - 固定元素高度(標題+圖片+按鈕) */
  max-height: calc(95vh - 160px); 
  overflow-y: auto;
  padding-right: 20px; /* 避免卷軸蓋文字 */
  padding-top: 10px;
  padding-bottom: 10px;
}

/* 頁數顯示 */
.slidePageNumber {
  position: absolute;
  top: 40px;
  left: 40px;   /* ← 改成 left */
  right: auto;  /* ← 加這行避免衝突 */
  font-family: "BpmfZihiKaiStd-Regular";
  font-size: 18px;
  color: #ffffff;
}

/* 略過教學按鈕 */
#skipBtn {
  display: none;
  background: #444444;
  color: white;
  font-size: 22px;
  padding: 12px 30px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-family: "BpmfZihiKaiStd-Regular";
}

/* ===== 圖片固定高度容器 ===== */
.imageBox {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  flex-shrink: 0; /* 不被壓縮 */
  max-height: 40%; /* 高度上限為藍框的 40% */
  width: 100%;
}

.imageBox img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain; /* 保持完整比例 */
  display: block;
}

/* ===== 假裝自己是遊戲標題 ===== */
.textTitle{
  font-size:36px;
  margin:0;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:bold; 
  margin-bottom:45px; 
}

/* ===== 操作說明標題區 ===== */
.topTitleBox{
  height:50px;
  width:200px;
  border:3px solid #ffffff;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:bold;
  margin-bottom:45px;
  margin-left:auto;
  margin-right:auto;
}

.navBtn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:26px;
  padding:12px 18px;
  border-radius:50%;
  background:white;
  border:none;
  cursor:pointer;
  font-family:"BpmfZihiKaiStd-Regular";
  display:flex;
  align-items:center;
  justify-content:center;
}
#prevBtn{left:-35px;}
#nextBtn{right:-35px;}
#startBtn{
  display:none;
  background:#0066CC;
  color:white;
  font-size:22px;
  padding:12px 30px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  font-family:"BpmfZihiKaiStd-Regular";
}

/* ===== 遊戲版面 ===== */
#game{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
#top{
  display:flex;
  flex:1;   /* 自動撐滿剩餘高度 */
  min-height:0; /* 防止爆開 */
  overflow:auto;
}
#left{
  flex:2;
  display:flex;
  align-items:center;
  justify-content:center;  
  position:relative;
  background:#ffffff;
}
#right{
  flex:1;
  display:flex;
  flex-direction:column;
  background:#e6f4ff;
}
#product{
  width: 80%;
  max-width: 500px;
  aspect-ratio: 1 / 1;   /* 保持正方形 */
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

#product img{
  width:100%;
  height:100%;
  object-fit:contain;
}
#priceTag{
  position:absolute;
  bottom:10px;  
  right:10px;   
  background:#97CBFF;
  padding:12px 22px;
  border-radius:14px;
  font-size:34px;
}
#replayBtn{
  position:fixed;
  top:10px;
  left:10px;
  background:#97CBFF;
  border:none;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
  font-size:20px;
  font-family:"BpmfZihiKaiStd-Regular";
}
#sumArea{
  height:25%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  font-size:30px;
  background:#cfe8ff;
}
#eyeBtn{
  position:absolute;
  right:15px;
  bottom:15px;
  cursor:pointer;
}
#payZone{
  height:60%;
  border:3px dashed #666;
  border-radius:20px;
  margin:10px;
  padding:10px;
  position:relative;
  background:#ffffff;
}
#payZone::before {
  content: "付錢區";
  position: absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-family:"BpmfZihiKaiStd-Regular";
  color:#cccccc;
  font-size:24px;
  pointer-events:none;
  z-index:0;
}

#finishBtn{
  margin:10px auto;
  padding:12px 30px;
  font-size:22px;
  font-family:"BpmfZihiKaiStd-Regular";
  border-radius:14px;
  border:none;
  background:#0066CC;
  color:white;
  cursor:pointer;
  display:block;
}

#coins{
  flex-shrink:0;   /* 不被壓縮 */
  padding:20px 60px;
  background:#d9d9d9;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:40px;
  padding:20px 60px;
  min-height:100px;
  box-sizing:border-box;
}
.coin{
  border:3px solid #333;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:grab;
  user-select:none;
  font-weight:bold;
  position:relative;
  font-family:"BpmfZihiKaiStd-Regular";
}
.coin[data-value="1000"]{width:110px;height:60px;background:#ABDBED;border-radius:12px;}
.coin[data-value="100"]{width:95px;height:60px;background:#EDABAB;border-radius:12px;}
.coin[data-value="10"]{width:60px;height:60px;background:#D7D4CB;border-radius:50%;}
.coin[data-value="1"]{width:45px;height:45px;background:#D6B880;border-radius:50%;}

#historyBtn{
  background:#97CBFF;
  font-size:24px;
  padding:14px 28px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  font-family:"BpmfZihiKaiStd-Regular";
}



/* ===== 歷史視窗 ===== */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:30000;
}
.modalContent{
  width:66%;
  max-width:700px;
  height:80%;
  margin-left:0;
  background:#97CBFF;
  border-radius:20px;
  padding:40px;
  box-sizing:border-box;
  text-align:center;
  overflow:auto;
  margin-right:30%;   /* ✅ 靠左 */
  margin-left:0;
}
.historyBlock{
  margin:20px 0;
}
.historyCoins{
  display:flex;
  gap:10px;
  justify-content:center;
  align-items:flex-end;
  flex-wrap:wrap;
}

.historyCoins .coinWrapper{
  display:flex;
  align-items:flex-end;
  margin-right:8px;
}
.historyCoins .coin{
  width:auto; height:auto;
  padding:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  margin-bottom:0;
}
.historyCoins .coin[data-value="1000"] {
  width:10vw;
  max-width:110px;
  height:5vw;
  max-height:60px;
  border-radius:12px;
  padding:0;
  font-size:16px;
}
.historyCoins .times{
  margin-left:4px;
  font-size:18px;
  align-self:flex-end;
}
.historyTitle{
  font-size:22px;
  margin-bottom:10px;
}

@media (max-width:1000px){

  #top{
    flex-direction:column;
  }

  #left{
    height:45vh;
  }

  #right{
    height:auto;
    flex:1;
  }

  #payZone{
    min-height:200px;
  }

  #coins{
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
  }

  #sumArea{
    display:flex;
    align-items:center;
    min-height:80px;
    gap:clamp(10px, 2vw, 30px);
    padding:0 10px;
  }

  #eyeBtn{
    position:static;
    right: 10px;

    margin-left:0;
  }

  #sumText{
    flex:1;
    text-align:center;
  }

  .modalContent{
    width:90%;
    height:50%;
    align-self:flex-start;
    margin-top:40px;
  }

}

/* ===== 倍數輸入小視窗 ===== */
.multiplierPopup{
  position:fixed;
  background:#0066CC;
  padding:10px 14px;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  z-index:20000;
}

.multiplierPopup input{
  width:70px;
  font-size:18px;
  text-align:center;
  font-family:"BpmfZihiKaiStd-Regular";
  border:none;
  border-radius:6px;
  padding:4px;
}

.multiplierConfirm{
  background:white;
  border:none;
  border-radius:8px;
  padding:4px 12px;
  font-size:18px;
  cursor:pointer;
  font-family:"BpmfZihiKaiStd-Regular";
}

#gameModal{
  position:fixed; 
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:40000; /* 蓋在付錢區和錢幣上 */
  pointer-events: all; 
}

.gameModalBox{
  background:#97CBFF;
  padding:30px 20px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  text-align:center;
  font-family:"BpmfZihiKaiStd-Regular";
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

#gameModalBtn{
  margin-top:20px;
  padding:10px 30px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:#0066CC;
  color:white;
  cursor:pointer;
  font-family:"BpmfZihiKaiStd-Regular";
}

/* 右側按鈕群組：往左移 + 排成一排 */
#actionBtns{
  display:flex;
  gap:16px;
  margin-left:auto;
  align-items:center;
}

#clearBtn{
  background:#444444;
  color:white;
  font-size:24px;
  padding:14px 28px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  font-family:"BpmfZihiKaiStd-Regular";
}

</style>
</head>

<div id="gameModal">

  </div>
</div>

<script>
// ===== 遊戲數據 =====
const PRICE=3512;
const REQUIRED_WAYS=3;
let currentSum=0;
let history=[];
let showSum=false;
let replayMode=false; // 判斷是否從重新看操作說明開啟

// ===== 音效 =====
const coinPlaceSound = new Audio('coinPlace.mp3');   
const coinRemoveSound = new Audio('coinRemove.mp3'); 
const successNewSound = new Audio('successNew.mp3');
const successRepeatSound = new Audio('successRepeat.mp3');
const successAllSound = new Audio('successAll.mp3');
const btnClickSound = new Audio('btnClick.mp3');

// ===== 預載入圖片 =====
[
  'intro2.png',
  'intro3.png',
  'intro4.png',
  'intro5.png',
  'intro6.png'
].forEach(src=>{

});

// ===== 提示頁內容 =====
const slides=[
`<div class="slideFirst">
  <div class="textTitle">
    付錢小遊戲
  </div>
  <div class="slideContentLeft">
    <p>我們在買東西󠇡時，</p>

`<div class="topTitleBox">操作說明</div>
<div class="slideContentLeft">

 <div class="imageBox">

 </div>
</div>`,



`<div class="topTitleBox">操作說明</div>
<div class="slideContentLeft">

</div>`,


`<div class="topTitleBox">操作說明</div>
<div class="slideContentLeft">

  <p>請在拿起錢幣後，</p>
  <p>將其移到右方的「付錢區」來支付。</p>

  <div class="imageBox">
  <img src="intro4.png" alt="說明圖片4">
  </div>

</div>`,


`<div class="topTitleBox">操作說明</div>
<div class="slideContentLeft">
  
  <p>如果你想一󠇡次多拿幾個󠇡錢幣，</p>
  <p>也可以在長按住錢幣後，</p>

 <div class="imageBox">
  <img src="intro5.png" alt="說明圖片5">
 </div>
</div>`,


`<div class="topTitleBox">操作說明</div>
<div class="slideContentLeft">

  <p>如果不小心放錯錢幣，</p>

`<div class="topTitleBox">操作說明</div>

  <p>當你在付錢區放上符合商品價格的錢幣時，</p>

</div>`,



`<div class="topTitleBox">操作說明</div>
<div class="slideContentLeft">

  <p>而如果你想看看之前用過的付款方式，</p>
  <p>點擊付錢區下方的「過去付款方式」按鈕，</p>

  <div class="imageBox">

`<div class="topTitleBox">操作說明</div>
<div class="slideContentLeft">

  <p>當你完成3種不同的支付方式時，</p>

  <p>一󠇢起來試試看用不同方式支付吧！</p>
</div>`
];

// ==== 重看說明 ==== //

const replaySlides = slides.slice(1); // 重看說明用（拿掉第一頁）

// ===== 控制 =====
let currentSlide=0;
function renderSlide(){
  const slideContent = document.getElementById('slideContent');
  const currentSlides = replayMode ? replaySlides : slides;

  slideContent.innerHTML = currentSlides[currentSlide];

  const contentDiv = slideContent.querySelector('.slideContentLeft');
  if(contentDiv){
    contentDiv.style.display = 'flex';
    contentDiv.style.flexDirection = 'column';
    contentDiv.style.justifyContent = 'flex-start';
  }

  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const startBtn = document.getElementById('startBtn');
  const skipBtn = document.getElementById('skipBtn');
  const pageNumber = document.getElementById('slideNumber');

  pageNumber.textContent = `${currentSlide + 1}/${currentSlides.length}`;

  prevBtn.style.display = currentSlide === 0 ? 'none' : 'block';
  nextBtn.style.display = currentSlide === currentSlides.length - 1 ? 'none' : 'block';
  startBtn.style.display = currentSlide === currentSlides.length - 1 ? 'block' : 'none';
  skipBtn.style.display = (!replayMode && currentSlide === 0) ? 'block' : 'none';

  startBtn.textContent = replayMode ? '回到遊戲' : '開始遊戲';

  /* ===== 右上角 ✕（只在重看模式，且不是最後一頁） ===== */
  let closeBtn = document.getElementById('closeIntroBtn');
  if(!closeBtn){
    closeBtn = document.createElement('button');
    closeBtn.id = 'closeIntroBtn';
    closeBtn.textContent = '✕';
    closeBtn.style.position = 'absolute';
    closeBtn.style.top = '20px';
    closeBtn.style.right = '20px';
    closeBtn.style.fontSize = '26px';
    closeBtn.style.background = 'transparent';
    closeBtn.style.border = 'none';
    closeBtn.style.color = '#fff';
    closeBtn.style.cursor = 'pointer';

    closeBtn.onclick = function(){
      btnClickSound.currentTime = 0;
      btnClickSound.play();
      document.getElementById('intro').style.display = 'none';
      replayMode = false;
    };

    document.querySelector('.slide').appendChild(closeBtn);
  }

// ✅ 重看模式：每一頁都顯示叉叉（包含最後一頁）
if(replayMode){
  closeBtn.style.display = 'block';
}else{
  closeBtn.style.display = 'none';
}
}


function nextSlide(){if(currentSlide<slides.length-1){currentSlide++;renderSlide();}}
function prevSlide(){if(currentSlide>0){currentSlide--;renderSlide();}}
function startGame(){
  btnClickSound.currentTime=0;
  btnClickSound.play();
  document.getElementById('intro').style.display='none';
  replayMode = false;
}
renderSlide();

// ===== 重新看操作說明 =====
document.getElementById('replayBtn').onclick = function(){
  replayMode = true;
  currentSlide = 0; // replaySlides 的第一頁（原本的 slides[1]）
  document.getElementById('intro').style.display = 'flex';
  renderSlide();
};

// ===== 金額 =====
function updateSum(){document.getElementById('sumText').textContent=showSum?currentSum+'元':'＊＊＊＊';}
document.getElementById('eyeBtn').onclick=function(){showSum=!showSum;updateSum();};
updateSum();

/* ===== 其他遊戲邏輯略（拖曳、判定、歷史） ===== */

/* ===== 拖曳 + 長按倍數（穩定版） ===== */

const payZone = document.getElementById('payZone');
const intro = document.getElementById('intro');

let selectedCoin = null;
let selectedOriginCoin = null; // 記住是哪顆原始錢幣
let offsetX = 0;
let offsetY = 0;
let isHolding = false;
let longPressTimer = null;
let isLongPress = false;


/* ===== 滑鼠移動 ===== */
document.addEventListener('mousemove', function(e){
  if(!isHolding || !selectedCoin) return;

selectedCoin.style.left = (e.clientX - offsetX + window.scrollX) + 'px';
selectedCoin.style.top = (e.clientY - offsetY + window.scrollY) + 'px';
});


/* ===== 點擊畫面 → 放下 ===== */
document.addEventListener('click', function(e){

  if(!isHolding || !selectedCoin) return;

  const payRect = payZone.getBoundingClientRect();
  const coinRect = selectedCoin.getBoundingClientRect();

  if(
    coinRect.left < payRect.right &&
    coinRect.right > payRect.left &&
    coinRect.top < payRect.bottom &&
    coinRect.bottom > payRect.top
  ){
    // 成功放入付款區

    selectedCoin.style.position = 'absolute';
    selectedCoin.style.left = (coinRect.left - payRect.left) + 'px';
    selectedCoin.style.top = (coinRect.top - payRect.top) + 'px';

    payZone.appendChild(selectedCoin);

    const val = Number(selectedCoin.dataset.value);
    const multi = Number(selectedCoin.dataset.multiplier || 1);

    currentSum += val * multi;
    updateSum();

    coinPlaceSound.currentTime = 0;
    coinPlaceSound.play();

    selectedCoin.onclick = function(){
      const v = Number(this.dataset.value);
      const m = Number(this.dataset.multiplier || 1);

      currentSum -= v * m;
      updateSum();

      coinRemoveSound.currentTime = 0;
      coinRemoveSound.play();

      this.remove();
    };


  }else{
    selectedCoin.remove();
  }

  // ===== 重設原始錢幣倍率 =====
  if(selectedOriginCoin && payZone.contains(selectedCoin)){
  resetMultiplier(selectedOriginCoin);
}

  selectedCoin = null;
  selectedOriginCoin = null;
  isHolding = false;
});


/* ===== 原始錢幣事件 ===== */
document.querySelectorAll('.coin').forEach(coin => {

  /* ===== 長按 ===== */
  coin.addEventListener('mousedown', function(e){

    if(getComputedStyle(intro).display !== 'none') return;

    isLongPress = false;

    longPressTimer = setTimeout(()=>{

  isLongPress = true;

  const rect = coin.getBoundingClientRect();

  const popup = document.createElement('div');
  popup.className = 'multiplierPopup';

  const input = document.createElement('input');
  input.type = 'text';
input.value = coin.dataset.multiplier || 1;
  input.min = 1;
  input.value = coin.dataset.multiplier || 1;

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'multiplierConfirm';
  confirmBtn.textContent = '✔';

const controls = document.createElement('div');
controls.style.display = 'flex';
controls.style.alignItems = 'center';
controls.style.gap = '10px';

const minus = document.createElement('button');
minus.className = 'multiplierConfirm';
minus.textContent = '◀';

const plus = document.createElement('button');
plus.className = 'multiplierConfirm';
plus.textContent = '▶';

minus.onclick = ()=> {
  let v = Number(input.value) || 1;
  if(v > 1) input.value = v - 1;
};

plus.onclick = ()=> {
  let v = Number(input.value) || 1;
  input.value = v + 1;
};

controls.appendChild(minus);
controls.appendChild(input);
controls.appendChild(plus);

popup.appendChild(controls);
popup.appendChild(confirmBtn);

  document.body.appendChild(popup);

  // 固定在錢幣正上方水平置中
// 先水平置中
let left = rect.left + rect.width / 2 - popup.offsetWidth / 2;

// 預設放在錢幣上方
let top = rect.top - popup.offsetHeight - 10;

// 如果上方放不下，就改放在錢幣下方
if (top < 10) top = rect.bottom + 10;

// 也避免超出右邊
left = Math.max(10, Math.min(left, window.innerWidth - popup.offsetWidth - 10));

// 如果放下方會超出底部，就再放回上方（能放的話）
if (top + popup.offsetHeight > window.innerHeight - 10) {
  const altTop = rect.top - popup.offsetHeight - 10;
  if (altTop >= 10) top = altTop;
  else top = Math.max(10, window.innerHeight - popup.offsetHeight - 10);
}

popup.style.left = left + 'px';
popup.style.top  = top + 'px';

// 依照錢幣高度動態決定距離
const popupHeight = popup.offsetHeight;
const dynamicOffset = rect.height + 10; 

popup.style.left = (rect.left + rect.width/2 - popup.offsetWidth/2 + window.scrollX) + 'px';
popup.style.top = (rect.top - popup.offsetHeight - 10 + window.scrollY) + 'px';

  confirmBtn.onclick = function(){
    const num = Number(input.value);
    if(num > 0){
      coin.dataset.multiplier = num;
      showMultiplierLabel(coin, num);
    }
    popup.remove();
  };

},600);
  });

  coin.addEventListener('mouseup', ()=> clearTimeout(longPressTimer));
  coin.addEventListener('mouseleave', ()=> clearTimeout(longPressTimer));


  /* ===== 單擊拿起 ===== */
  coin.addEventListener('click', function(e){

    if(getComputedStyle(intro).display !== 'none') return;

    if(isLongPress){
      isLongPress = false;
      return; // 長按後不要拿起
    }

    e.stopPropagation();

    const clone = coin.cloneNode(true);

    clone.dataset.multiplier = coin.dataset.multiplier || 1;

    clone.style.position = 'absolute';
    clone.style.zIndex = 9999;

    document.body.appendChild(clone);

const rect = coin.getBoundingClientRect();

clone.style.left = (e.clientX - rect.width / 2 + window.scrollX) + 'px';
clone.style.top = (e.clientY - rect.height / 2 + window.scrollY) + 'px';

offsetX = rect.width / 2;
offsetY = rect.height / 2;

    selectedCoin = clone;
    selectedOriginCoin = coin;
    isHolding = true;
  });

});


/* ===== 顯示倍數標籤 ===== */
function showMultiplierLabel(coin, num){

  let badge = coin.querySelector('.multiplierBadge');

  if(!badge){
    badge = document.createElement('div');
    badge.className = 'multiplierBadge';
    badge.style.position = 'absolute';
    badge.style.bottom = '-8px';
    badge.style.right = '-8px';
    badge.style.width = '28px';
    badge.style.height = '28px';
    badge.style.borderRadius = '50%';
    badge.style.background = '#0066CC';
    badge.style.color = 'white';
    badge.style.display = 'flex';
    badge.style.alignItems = 'center';
    badge.style.justifyContent = 'center';
    badge.style.fontSize = '14px';
    badge.style.fontWeight = 'bold';
    badge.style.fontFamily = "BpmfZihiKaiStd-Regular";
    coin.appendChild(badge);
  }

  badge.textContent = num;
}


/* ===== 重設倍率 ===== */
function resetMultiplier(coin){

  coin.dataset.multiplier = 1;

  const badge = coin.querySelector('.multiplierBadge');
  if(badge) badge.remove();
}
/* ===== 判定 ===== */
function checkPayment(){

  if(currentSum!==PRICE) return;

  const recordObj={1000:0,100:0,10:0,1:0};

  [...payZone.children].forEach(c=>{
    const value = Number(c.dataset.value);
    const multi = Number(c.dataset.multiplier || 1);
    recordObj[value] += multi;   // ⭐ 關鍵修正
  });

  const recordKey=JSON.stringify(recordObj);

  const isRepeat = history.includes(recordKey);

  if(isRepeat){

    showMessage(`你剛剛已經使用過這種方式了。<br>換一󠇢種支付方法試試吧！<br>還需要嘗試${REQUIRED_WAYS-history.length}種付錢方式喔！`,false);
    successRepeatSound.currentTime=0;
    successRepeatSound.play();

    // ⭐ 重複才清空
    payZone.innerHTML='';
    currentSum=0;
    updateSum();

  }else{

    history.push(recordKey);

    if(history.length<REQUIRED_WAYS){
      showMessage(`你已完成${history.length}種支付方式，<br>還要嘗試${REQUIRED_WAYS-history.length}種方式來付錢。`,false);
      successNewSound.currentTime=0;
      successNewSound.play();
    }else{
      showMessage(`恭喜你已經用了3種不同的方式來完成支付！<br><br>同樣的金額可以有很多不同的付款方式。`,true);
      successAllSound.currentTime=0;
      successAllSound.play();
    }

    // ⭐ 不重複時不要清空
  }
}

/* ===== 提示訊息視窗 ===== */

  const btn = document.getElementById('startBtn');

  document.getElementById('slideNumber').style.display = 'none';
  document.getElementById('skipBtn').style.display = 'none';
  document.getElementById('prevBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  intro.style.display = 'flex';
  intro.style.zIndex = 50000;

  // ===== 如果已完成全部三種 =====
  if(cannotClose){

    btn.style.display = 'none';

content.innerHTML = `
<div style="
  display:flex;

">

  <div style="

  ">
    <button id="restartBtn"
      style="font-size:22px;padding:12px 30px;border-radius:14px;border:none;background:#0066CC;color:white;font-family:BpmfZihiKaiStd-Regular;cursor:pointer;">
      再玩一󠇡次
    </button>

    <button id="closeGameBtn"
      style="font-size:22px;padding:12px 30px;border-radius:14px;border:none;background:#444;color:white;font-family:BpmfZihiKaiStd-Regular;cursor:pointer;">

</div>`;

    document.getElementById('restartBtn').onclick = function(){

<div style="
  display:flex;
  height:100%;
  font-size:22px;
  line-height:1.8;
  text-align:left;

  justify-content:flex-start; /* 水平靠左 */
  padding:40px;
  box-sizing:border-box;
">
  <div>
    ${text}
  </div>

    btn.onclick = function(){

/* ===== 歷史 ===== */
document.getElementById('historyBtn').onclick=function(){
  const modal=document.getElementById('modal');
  const content=document.getElementById('modalContent');
  content.innerHTML=`<h2>${PRICE}元</h2>`;
  if(history.length===0){content.innerHTML+='<p>目前還沒有完成過支付</p>';}
  else history.forEach((r,i)=>{
    const obj=JSON.parse(r);
    content.innerHTML+=`<div class="historyBlock">
      <div class="historyTitle">第${i+1}種方式</div>
      <div class="historyCoins">${renderHistoryCoins(obj)}</div>
    </div>`;
  });
  modal.style.display='flex';
  modal.style.zIndex=100;
};
document.getElementById('modal').onclick=function(e){if(e.target.id==='modal')this.style.display='none';};

function renderHistoryCoins(obj){
  const order=[1000,100,10,1];
  let html='';

  order.forEach(v=>{
    if(obj[v]>0){

      // 判斷量詞
      const unit = (v === 1000 || v === 100) ? '張' : '個󠇡';

      html+=`<div class="coinWrapper">
        <div class="coin" data-value="${v}" style="cursor:default;">${v}</div>
        <div class="times">x${obj[v]}${unit}</div>
      </div>`;
    }
  });

  return html;
}


/* ===== 完成付款 ===== */
document.getElementById('finishBtn').onclick = function(){
  if(currentSum === 0){
    // 尚未放錢幣 → 跟金額未達時一樣樣式
    showGameModal('你還沒有放入任何錢幣喔！');
    return;
  }

  if(currentSum !== PRICE){
    // 金額不對
    showGameModal('現在付的金額不󠇡是商品的價錢喔！');
  } else {
    checkPayment();
  }
};

function showGameModal(text){
  const modal = document.getElementById('gameModal');
  const textBox = document.getElementById('gameModalText');
  const btn = document.getElementById('gameModalBtn');

  // 放文字
  textBox.innerHTML = `<div style="font-size:22px;line-height:1.8;">${text}</div>`;

  // 顯示彈窗 & 半透明背景
  modal.style.display = 'flex';
  modal.style.background = 'rgba(0,0,0,0.55)'; // 黑灰半透明，像 intro

  btn.onclick = function(){
    btnClickSound.currentTime = 0;
    btnClickSound.play();
    modal.style.display = 'none';
  };
}

// ✅ 一鍵清空：清空付錢區的錢幣 + 金額歸零
document.getElementById('clearBtn').onclick = function(){
  // 清除付錢區所有錢幣
  payZone.innerHTML = '';

  // 金額歸零
  currentSum = 0;
  updateSum();

  // 可選：播放移除音效（如果你希望有回饋）
  coinRemoveSound.currentTime = 0;
  coinRemoveSound.play();
};
